project:
  name: spring-ai-template
  description: 标准 Spring Boot AI 协作脚手架
  version: 1.0.0

stack:
  framework: spring-boot:3.x
  java: 21
  orm: mybatis
  orm_style: xml-mapper
  database: mysql:8
  cache: redis

architecture:
  datasource:
    environments:
      - dev
      - test
      - prod
    fallback:
      enabled_profiles:
        - dev
        - test
      disabled_profiles:
        - prod
      target: h2
  cache:
    abstraction: CacheService
    implementations:
      - RedisCacheService
      - NoopCacheService
    strategy: graceful-degrade
    rule: Redis 不可用时业务必须继续走数据库主链路

response:
  wrapper: Result<T>
  success_code: 0
  fields:
    code: integer
    message: string
    data: T

rules:
  must:
    - Controller 只做参数接收、参数校验和响应组装
    - Service 负责业务逻辑，禁止直接返回 Entity
    - Repository 只做 MyBatis 数据访问，SQL 统一写在 XML
    - 所有接口必须返回 Result<T>
    - 缓存调用必须通过 CacheService，不要在业务层直接注入 RedisTemplate
    - app.* 配置必须优先使用 @ConfigurationProperties 绑定
    - Redis 关闭时必须使用 NoopCacheService，不要让业务层判断缓存开关
    - 并发任务必须使用 appTaskExecutor，禁止 new Thread()
    - 禁止硬编码密钥、密码、token、AK/SK
  should:
    - 类和 public 方法应保留清晰中文注释
    - 日志必须能关联 traceId
    - 新增 Service 方法应补充核心路径测试
    - 新增 DTO 字段应同步补充 jakarta.validation 校验
  avoid:
    - 避免字段注入，优先使用构造函数注入
    - 避免在 Controller 中编写业务逻辑
    - 避免在模板中加入演示接口污染业务入口

ai:
  edit_scope:
    - src/main/java/org/xinhuamm/demo/**
    - src/test/java/org/xinhuamm/demo/**
    - src/main/resources/application*.yml
    - src/main/resources/mapper/**
  forbidden_paths:
    - "**/application-prod*.yml"
    - "**/*.pem"
    - "**/*.key"
    - "**/*.p12"

conventions:
  controller_path: /api/v1/**
  trace_id_source: MDC.get("traceId")
  thread_pool_bean: appTaskExecutor
