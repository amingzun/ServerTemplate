server:
  port: 8080

app:
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 200
    thread-name-prefix: app-async-
  redis:
    enabled: true
  datasource:
    fallback-enabled: false

spring:
  application:
    name: spring-ai-template
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/demo_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: PT3S

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.xinhuamm.demo.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
