spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/demo_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: PT3S

app:
  redis:
    enabled: false
  datasource:
    h2:
      url: jdbc:h2:mem:demo_db;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
      driver-class-name: org.h2.Driver
      username: sa
      password: ""
